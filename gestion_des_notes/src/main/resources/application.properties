gestion_.de_.notes.app.jwtSecret=N8POL/iezxnCH6K/zJ04SZFLEF5TrFmIgnjtoMq8wRM=

# JWT Token Expiration Time in milliseconds (e.g., 24 hours)
# JWT expire après 7 jours (604800000 ms = 7 jours) - Pour développement
gestion_.de_.notes.app.jwtExpirationMs=604800000

# Database Configuration (example for PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5433/GradeManagement_db
spring.datasource.username=postgres
spring.datasource.password=vladimir
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Config
# avoid <ddl-auto on "create"> it recreate the table each time the application is relaunched
# Use 'update' for dev, 'none' or 'validate' for prod
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.hibernate.ddl-auto=create-drop # DANGER: Supprime les données à chaque redémarrage
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# swagger-ui custom path
springdoc.swagger-ui.path=/swagger-ui.html

#Docker compose file
spring.docker.compose.file=./gestion_des_notes/compose.yaml

server.port=8088
